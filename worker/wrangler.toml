name = "biolink-worker"
main = "src/index.ts"
compatibility_date = "2024-05-12"

[vars]
JWT_SECRET = "change-this-to-a-secure-secret-in-production"
FRONTEND_URL = "http://localhost:5173"

[[d1_databases]]
binding = "DB"
database_name = "biolink-db"
database_id = "placeholder-replace-with-real-id"

[[kv_namespaces]]
binding = "SESSIONS"
id = "placeholder-replace-with-real-id"

[[r2_buckets]]
binding = "AVATARS"
bucket_name = "biolink-avatars"
